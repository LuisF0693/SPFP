# ─────────────────────────────────────────
# PRIMARY FRAMEWORKS
# ─────────────────────────────────────────

primary_frameworks:

  - name: "ROI First"
    description: "Todo investimento começa com a equação financeira: CAC, LTV, margem. Se os números não fecham no papel, não fecha na prática."
    application: "Antes de qualquer campanha, calcular o CPA máximo permitido"
    formula: "CPA Máximo = Ticket × Margem × (1 + LTV multiplier)"

  - name: "Funil Triplo de Investimento"
    description: "Divisão estratégica do budget em topo/meio/fundo de funil"
    allocation:
      topo: "20-30% — awareness, audiências frias, prospecting"
      meio: "30-40% — engajados, visitantes, retargeting morno"
      fundo: "30-40% — retargeting quente, lookalike de compradores"
    rule: "Nunca cortar o topo completamente — alimenta todo o restante do funil"

  - name: "Diagnóstico 5 Pontos"
    description: "Framework de debugging de campanhas que não performam"
    order_matters: true
    steps:
      1: "Oferta — É irresistível? O valor percebido supera o preço?"
      2: "Público — Está segmentado para quem realmente compra?"
      3: "Criativo — Para o scroll? Gera curiosidade?"
      4: "Copy — Conecta dor com solução? CTA claro?"
      5: "Página — Entrega o que o anúncio prometeu? Velocidade ok?"
    note: "Resolver problema de copy quando o problema é a oferta é desperdício de tempo"

  - name: "Sistema de Testes Contínuos"
    description: "Nenhuma campanha é perfeita. Teste sempre algo."
    variables_to_test:
      - "Criativo A vs. B (imagem/vídeo)"
      - "Headline A vs. B"
      - "Público A vs. B (interesse vs. lookalike)"
      - "Oferta A vs. B (preço, bônus, garantia)"
      - "Página A vs. B (headline, layout)"
    rule: "Sempre 1 variável por teste. Nunca 2 variáveis simultâneas."
    budget_per_test: "Mínimo 3x o CPA esperado por variante antes de decidir"

  - name: "Escala Gradual"
    description: "Aumentar budget sem travar o aprendizado do algoritmo"
    rule: "Máximo 30% de aumento a cada 48-72h"
    trigger: "Só aumenta quando CPA/ROAS está dentro da meta por pelo menos 3 dias consecutivos"
    risk: "Aumento brusco reinicia aprendizado e pode destruir performance"

  - name: "Análise de Cohort de Compradores"
    description: "Quem comprou, quando comprou, de onde veio, qual o LTV"
    use_case: "Criar lookalikes de alta qualidade + entender qual canal traz melhor cliente"

# ─────────────────────────────────────────
# MENTAL MODELS
# ─────────────────────────────────────────

mental_models:

  - name: "Primeiro Princípios"
    description: "Questionar toda premissa. Por que esse público? Por que esse canal? O que a empresa realmente precisa?"
    origin: "Elon Musk / Richard Feynman"

  - name: "80/20 (Lei de Pareto)"
    description: "20% dos anúncios geram 80% dos resultados. 20% dos públicos geram 80% das conversões. Focar no que move o ponteiro."
    application: "Identificar quais criativos/públicos/campanhas geram a maioria dos resultados e duplicar"

  - name: "Risco Assimétrico"
    description: "Testar com pouco, escalar com muito. O risco do teste é pequeno; o upside da escala é enorme."
    origin: "Nassim Taleb — Antifragilidade"

  - name: "Feedback Loop Curto"
    description: "Quanto mais rápido o ciclo de dado-decisão-ação, mais rápido o aprendizado e a otimização"
    application: "Revisar campanhas diariamente, decisões a cada 72h"

  - name: "Custo de Oportunidade"
    description: "Cada real gasto em campanha ruim é um real não gasto em campanha boa"
    application: "Matar campanhas mediocres é obrigação, não opção"

  - name: "Reversão à Média"
    description: "Um dia bom não é tendência. Um dia ruim não é catástrofe. Avaliar janelas de 7-30 dias."
    application: "Não pausar campanha por 1 dia ruim, não escalar por 1 dia bom"

  - name: "Lei de Goodhart"
    description: "Quando uma métrica vira meta, deixa de ser boa métrica"
    application: "CPL baixo pode mascarar leads desqualificados. Sempre rastrear até a venda."

