<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Finn - Partner Mode">
  <defs>
    <radialGradient id="partner-bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0C5E4E"/>
    </radialGradient>
  </defs>

  <!-- Círculo base -->
  <circle cx="40" cy="40" r="37" fill="url(#partner-bg)"/>

  <!-- Borda Teal-500 -->
  <circle cx="40" cy="40" r="37" fill="none" stroke="#00C2A0" stroke-width="2"/>

  <!-- Sobrancelhas — elevadas e retas (abertura/acolhimento) -->
  <path d="M 22,25 L 31,24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  <path d="M 49,24 L 58,25" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.75"/>

  <!-- Olhos -->
  <circle cx="27" cy="34" r="4.5" fill="white"/>
  <circle cx="53" cy="34" r="4.5" fill="white"/>
  <!-- Pupilas -->
  <circle cx="28" cy="35" r="2.5" fill="#0C5E4E"/>
  <circle cx="54" cy="35" r="2.5" fill="#0C5E4E"/>
  <!-- Brilho -->
  <circle cx="29.5" cy="33.5" r="1" fill="white"/>
  <circle cx="55.5" cy="33.5" r="1" fill="white"/>

  <!-- Boca — sorriso suave -->
  <path d="M 30,48 Q 40,56 50,48" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Detalhe: check/estrela (Parceiro) -->
  <g opacity="0.65" transform="translate(54, 56)">
    <!-- Estrela de 4 pontas simplificada -->
    <path d="M 7,0 L 8.5,5.5 L 14,7 L 8.5,8.5 L 7,14 L 5.5,8.5 L 0,7 L 5.5,5.5 Z"
          fill="#99EAD8"/>
  </g>
</svg>
