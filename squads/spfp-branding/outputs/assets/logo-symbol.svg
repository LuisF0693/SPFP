<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="SPFP Symbol">
  <!-- F-Arrow symbol isolado (para favicon, espaços mínimos) -->

  <!-- Vertical stroke -->
  <line x1="7" y1="36" x2="7" y2="5"
        stroke="#1E6FE8" stroke-width="4" stroke-linecap="round"/>

  <!-- Top bar com curva suave -->
  <path d="M 7,5 C 14,4.5 21,4 28,3"
        stroke="#1E6FE8" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Arrowhead -->
  <path d="M 22,1 L 30,3 L 24,9"
        stroke="#1E6FE8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Middle bar -->
  <line x1="7" y1="19" x2="22" y2="19"
        stroke="#1E6FE8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Teal dot Finn -->
  <circle cx="22" cy="19" r="4" fill="#00C2A0"/>
</svg>
