# cognitive-spec.yaml template
# Generated by persona-synthesizer from cognitive-analyst layers analysis
# Compatible with clone-deploy/clone-diagnostician expectations

slug: "{slug}"
person_name: "{Full Name}"
version: "1.0"
generated_at: "{ISO timestamp}"
mmos_version: "1.0"

# Overall readiness summary
readiness:
  score: 0  # 0-100, populated by mind-validator
  verdict: "PENDING"  # BLOCKED | CONDITIONAL | APPROVED | EXCELLENT
  layers_covered: 0   # out of 8

# DNA Mental — 8 Cognitive Layers
layers:

  layer_1_knowledge_base:
    coverage: 0  # 0-10 score
    primary_domains: []
    secondary_domains: []
    expertise_depth:
      deep: []    # Domains with true original expertise
      solid: []   # Strong working knowledge
      aware: []   # Familiar but not expert
    evidence_count: 0

  layer_2_communication_style:
    coverage: 0
    primary_tone: ""          # ex: "didático-provocativo"
    register: ""              # ex: "informal com peso conceitual"
    sentence_structure: ""    # ex: "curtas e diretas, muitas perguntas retóricas"
    favorite_metaphors: []
    signature_phrases: []
    what_to_avoid: []         # Phrases that would break the illusion
    evidence_count: 0

  layer_3_behavioral_patterns:
    coverage: 0
    recurring_decisions: []
    response_to_criticism: ""
    response_to_praise: ""
    decision_speed: ""        # ex: "deliberado, não impulsivo"
    risk_tolerance: ""
    collaboration_style: ""
    evidence_count: 0

  layer_4_values_decisions:
    coverage: 0
    values_hierarchy:         # Listed in priority order
      - name: ""
        description: ""
        evidence: ""
    key_tradeoffs:
      - prefers: ""
        over: ""
        reason: ""
    mental_models_used: []
    evidence_count: 0

  layer_5_meta_axioms:
    coverage: 0
    core_obsessions: []       # Themes that appear in EVERYTHING they produce
    unquestioned_beliefs: []  # What they assume without proving
    driving_question: ""      # The one question that drives all their work
    evidence_count: 0

  layer_6_belief_system:
    coverage: 0
    view_of_human_nature: ""
    theory_of_change: ""
    role_of_organizations: ""
    relationship_with_technology: ""
    economic_worldview: ""
    evidence_count: 0

  layer_7_identity_core:
    coverage: 0
    cognitive_singularity: ""  # What they see that others don't
    original_contributions: []
    intellectual_lineage: []   # Who influenced them most
    self_description: ""       # How THEY describe themselves
    evidence_count: 0

  layer_8_productive_paradoxes:
    coverage: 0
    paradoxes:
      - tension: ""
        explanation: ""
        how_it_drives_them: ""
    apparent_contradictions: []
    evidence_count: 0

# Source Summary
sources_used:
  total_count: 0
  primary_sources: []
  secondary_sources: []
  date_range:
    earliest: ""
    latest: ""

# System Prompt Stats
system_prompt:
  path: "system_prompts/{slug}-system-prompt.md"
  token_count: 0
  sections_present: []

# Knowledge Base Stats
knowledge_base:
  total_token_count: 0
  files:
    - filename: ""
      token_count: 0
      topics: []
