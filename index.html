<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SPFP — Seu Planejador Financeiro Pessoal</title>
  <meta name="description" content="Consultoria especializada em planejamento financeiro pessoal com inteligência artificial. A consultoria do Luis. A inteligência do Finn.">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="SPFP — Seu Planejador Financeiro Pessoal">
  <meta property="og:description" content="Consultoria especializada em planejamento financeiro com IA. A consultoria do Luis. A inteligência do Finn.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:url" content="https://spfp.app">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SPFP — Seu Planejador Financeiro Pessoal">
  <meta name="twitter:description" content="Consultoria especializada + IA financeira pessoal. A consultoria do Luis. A inteligência do Finn.">
  <meta name="twitter:image" content="/og-image.png">

  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SPFP">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A1628">

  <link rel="manifest" href="manifest.json">

  <!-- SPFP Brand Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@800&family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <!-- SPFP Favicon -->
  <link rel="icon" type="image/png" href="/branding/app-icon.png">
  <link rel="apple-touch-icon" href="/branding/app-icon.png">

  <!-- Prevent Flash of Wrong Theme (FOUC) - STY-018 -->
  <script>
    (function() {
      const storedTheme = localStorage.getItem('spfp_theme_preference') || 'system';
      const isDark = storedTheme === 'dark' ||
                     (storedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <style>
    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .premium-gradient {
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
    }

    .text-glow {
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Estilos para parecer app nativo no iOS */
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      user-select: none;
      background-color: #000000;
      /* Fundo Preto */
    }

    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 
         OVERRIDE GLOBAL PARA DARK MODE SPFP 
         Isso inverte as cores padrão do Tailwind usadas nos componentes
         para evitar ter que reescrever todos os arquivos um por um.
         APLICADO APENAS QUANDO A CLASSE DARK ESTÁ PRESENTE NO HTML
      */

    /* Fundo da aplicação (era cinza claro, agora é preto no dark mode) */
    html.dark .bg-gray-50 {
      background-color: #000000 !important;
    }

    /* Cards e Containers (era branco, agora é cinza escuro/azulado no dark mode) */
    html.dark .bg-white {
      background-color: #0f172a !important;
      border-color: #1e293b !important;
    }

    /* Texto Principal (era preto/cinza escuro, agora é branco no dark mode) */
    html.dark .text-gray-900 {
      color: #ffffff !important;
    }

    html.dark .text-gray-800 {
      color: #f8fafc !important;
    }

    html.dark .text-gray-700 {
      color: #e2e8f0 !important;
    }

    html.dark .text-gray-600 {
      color: #cbd5e1 !important;
    }

    /* Bordas (eram cinza claro, agora cinza escuro para contraste no preto no dark mode) */
    html.dark .border-gray-200,
    html.dark .border-gray-100 {
      border-color: #1e293b !important;
    }

    html.dark .border-gray-50 {
      border-color: #0f172a !important;
    }

    /* Ajustes específicos de Hover */
    html.dark .hover\:bg-gray-50:hover {
      background-color: #1e293b !important;
    }

    html.dark .hover\:bg-gray-100:hover {
      background-color: #334155 !important;
    }

    /* Inputs (garantir legibilidade no fundo escuro no dark mode) */
    html.dark input,
    html.dark select,
    html.dark textarea {
      background-color: #020617 !important;
      color: white !important;
      border-color: #334155 !important;
    }

    /* Skip to Main Content Link - WCAG 2.1 AA */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 0;
      z-index: 9999;
      padding: 1rem 1.5rem;
      background-color: #3b82f6;
      color: #ffffff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 0 0 0.5rem 0;
      transition: top 0.3s ease-in-out;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
    }

    .skip-link:focus {
      top: 0;
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-black text-gray-100 antialiased">
  <div id="root"></div>
  <script type="module" src="./src/index.tsx"></script>
</body>

</html>
